# configs/mrm_config.yaml
bounds:
  radius: [9.0, 15.0]       # R: 微环半径 (um) - 强制探索非最小半径
  gap: [150.0, 300.0]       # g: 耦合间距 (nm) - 流片厂DRC安全线
  width: [400.0, 480.0]     # w: 波导宽度 (nm)，保证单模
  Nd: [17.0, 18.47]         # Nd: 掺杂浓度对数 (log10(cm^-3)), 上限3e18
  rL: [0.0, 0.5]            # rL: 调制区占空比
  Lc: [2.0, 10.0]           # Lc: 跑道型直线耦合段长度 (um), 强制跑道结构

optimization:
  init_points: 80            # 初始 LHS 采样点数 (6D空间充分覆盖)
  n_iter: 50                # 贝叶斯主动学习迭代次数
  batch_size: 4              # 每次并行评估4个候选点

targets:
  ER_min: 4.0               # 谐振点消光比下限 (dB)
  Q_min: 4000.0             # 品质因数下限
  Q_max: 10000.0            # 品质因数上限
  fEO_min: 20e9             # 总联合电光调制带宽 (Hz) - 放宽以允许中等掺杂
  FSR_min: 6.4e-9           # 自由光谱范围下限 (m)
  V_op: 1.0                 # 驱动电压 (V)
  lambda_0: 1550e-9         # 中心波长 (m)