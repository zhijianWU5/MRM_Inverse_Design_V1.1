# configs/mrm_config.yaml
bounds:
  radius: [10.0, 15.0]     # R: 微环半径 (um)，已按FSR收紧
  gap: [150.0, 300.0]      # g: 耦合间距 (nm)
  width: [400.0, 480.0]    # w: 波导宽度 (nm)，保证单模
  Nd: [17.0, 18.0]         # Nd: 掺杂浓度对数 (log10(cm^-3))
  rL: [0.0, 0.5]           # rL: 调制区占空比

optimization:
  init_points: 10          # 初始 LHS 采样点数
  n_iter: 20               # 贝叶斯主动学习迭代次数
  batch_size: 1            # 每次迭代推荐的候选点数量 (q)

targets:
  ER_min: 10.0             # 谐振点消光比下限 (dB)
  Q_min: 9700.0            # 品质因数下限
  Q_max: 10000.0           # 品质因数上限
  fRC_min: 20e9            # RC 带宽下限 (Hz)
  FSR_min: 6.4e-9          # 自由光谱范围下限 (m)
  V_op: 1.0                # 驱动电压 (V)
  lambda_0: 1550e-9        # 中心波长 (m)