# configs/mrm_config.yaml
bounds:
  radius: [8.0, 15.0]     # R: 微环半径 (um)，已按FSR收紧
  gap: [100.0, 300.0]      # g: 耦合间距 (nm)
  width: [400.0, 480.0]    # w: 波导宽度 (nm)，保证单模
  Nd: [17.0, 18.47]        # Nd: 掺杂浓度对数 (log10(cm^-3)), 提升至3e18
  rL: [0.0, 0.5]           # rL: 调制区占空比

optimization:
  init_points: 15          # 初始 LHS 采样点数 (已恢复至建议值以覆盖更广区域)
  n_iter: 50               # 贝叶斯主动学习迭代次数
  batch_size: 1            # 每次迭代推荐的候选点数量 (q)

targets:
  ER_min: 4.0              # 谐振点消光比下限 (dB) - 保证基础光强调制幅度
  Q_min: 4000.0            # 品质因数下限 (防止过度展宽)
  Q_max: 10000.0           # 品质因数上限 (放宽以确保可行域存在)
  fEO_min: 25e9            # 总联合电光调制带宽 (Hz) - 从35降至25以匹配物理可行域
  FSR_min: 6.4e-9          # 自由光谱范围下限 (m)
  V_op: 1.0                # 驱动电压 (V)
  lambda_0: 1550e-9        # 中心波长 (m)